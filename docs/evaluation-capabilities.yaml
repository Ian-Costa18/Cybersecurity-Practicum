  user_stories: [1]
  demo: [act0]
  tests:
    - tests/accounts/test_provision.py::test_cli_provisions_against_settings_db
    - tests/accounts/test_provision.py::test_pre_credentialed_creates_enrolled_user_that_can_sign
    - tests/demo/test_act0_provisioning.py::test_provisions_three_co_owners_who_can_vote
    - tests/demo/test_act0_provisioning.py::test_mode_b_co_owners_are_born_enrolled_and_can_sign

