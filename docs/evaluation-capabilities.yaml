# The capabilities catalog — what the system *does*, and the tests that prove it.
#
# One of the two evidence catalogs (issue #157). Its sibling, docs/threat-model/, holds
# what the system *prevents*. Together their `tests:` are the **evaluation suite**:
#
#     uv run tools/evidence.py suite
#     uv run pytest $(uv run tools/evidence.py suite --format ids)
#
# Which catalog a claim belongs to is decided by one question. If an actor *invokes or
# receives* it, it is a capability and belongs here. If it is a property the system holds
# so that an attacker cannot act — and an honest actor never observes it — it is a
# mitigation and belongs in the threat catalog. "The private key is ciphertext at rest" is
# a mitigation; "an Approver downloads the exact artifact" is a capability.
#
# Fields (validated by `uv run tools/capabilities.py validate`, which also runs in pytest):
#
#   id           CAP-<n>, unique.
#   statement    What the system does, in product-flow voice. Not a demo caption.
#   user_stories The mvp-prd.md §User Stories numbers this capability satisfies — the *why*.
#                Every number must exist; the story list is append-only for this reason.
#   demo         Optional. Which acts of the evaluation demo show it: act0 | act1 | act2.
#                Entries without it are real evidence that simply is not screen time.
#   tests        >=1 pytest node id, each resolving to a real, collectable test.
#
# Nothing here restates anything, so nothing can drift. Scope: package publishing only —
# the shared-account capabilities are absent, which is what makes the declared evaluation
# scope (#109) a property of what runs rather than a promise in prose.

