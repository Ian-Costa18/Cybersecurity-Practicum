<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Waiting for approval — {{ approval.service_name }}</title>
</head>
<body>
  <h1>Waiting for approval</h1>

  <dl>
    <dt>Service</dt><dd>{{ approval.service_name }}</dd>
    <dt>Status</dt><dd id="state">{{ approval.state }}</dd>
    <dt>Quorum</dt>
    <dd id="quorum">{{ tally.approvals }} of {{ tally.quorum }} approvals received</dd>
  </dl>

  <p id="spinner">Waiting for your co-owners to vote…</p>
  <p id="denial-reason" hidden></p>
  {% if request_again_url %}
  <p><a id="request-again" href="{{ request_again_url }}" hidden>Request again</a></p>
  {% endif %}

  <script>
    // The original URL to return to on quorum (forward-auth); null when absent
    // (one-time, or a direct visit) — the page then just shows the granted state.
    const returnTo = {{ return_to | tojson }};

    // Live quorum updates via SSE (projects request.vote_recorded / closing events).
    const source = new EventSource("{{ stream_url }}");
    const quorum = document.getElementById("quorum");
    const state = document.getElementById("state");
    function update(e) {
      const d = JSON.parse(e.data);
      quorum.textContent = d.count + " of " + d.required + " approvals received";
      state.textContent = d.state;
    }
    source.addEventListener("approval", update);
    source.addEventListener("quorum_reached", (e) => {
      update(e);
      source.close();
      // On quorum the Service Grant exists: send the browser back to the original
      // URL, where /auth now returns 200 and the request proceeds to the backend.
      if (returnTo) {
        window.location = returnTo;
      } else {
        document.getElementById("spinner").textContent = "Approved — access granted.";
      }
    });
    source.addEventListener("denied", (e) => {
      update(e);
      source.close();
      const d = JSON.parse(e.data);
      document.getElementById("spinner").textContent = "Request denied.";
      if (d.reason) {
        const reason = document.getElementById("denial-reason");
        reason.textContent = "Reason: " + d.reason;
        reason.hidden = false;
      }
      const again = document.getElementById("request-again");
      if (again) { again.hidden = false; }
    });
  </script>
</body>
</html>
