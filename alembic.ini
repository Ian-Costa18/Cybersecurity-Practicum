# Alembic configuration. The database URL is resolved in migrations/env.py from
# MSIG_DATABASE_URL (the same Settings the app uses), so the value below is only
# a fallback for tooling that ignores env.py.
[alembic]
script_location = migrations
prepend_sys_path = src
path_separator = os
sqlalchemy.url = sqlite+pysqlite:///./msig_proxy.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
